  - id: azure-storage-queue
    name: 'Azure Storage Queue'
    category: messaging
    severity: information
    report_threshold: 60
    bands:
      medium: 60
      high: 95
      very_high: 130
    require_distinct_indicators: 2
    asset:
      extractors:
        - from: host
          regex: '(?i)([a-z0-9]{3,24})\.queue\.core\.windows\.net'
          asset_id: '$1'
          label: 'Azure Storage Queue account: $1'
        - from: url
          regex: '(?i)://[a-z0-9]{3,24}\.queue\.core\.windows\.net/([a-z0-9](?:[a-z0-9-]{1,61}[a-z0-9]))'
          asset_id: '$1'
          label: 'Azure Storage Queue: $1'
      host_level_fallback: true
    indicators:
      - id: host-suffix
        source: host
        match: regex
        pattern: '(?i)\.queue\.core\.windows\.net'
        weight: 40
      - id: server-header
        source: header
        match: contains
        pattern: 'Windows-Azure-Queue'
        weight: 35
      - id: x-ms-version-present
        source: header-name
        match: iequals
        pattern: 'x-ms-version'
        weight: 20
      - id: x-ms-request-id-present
        source: header-name
        match: iequals
        pattern: 'x-ms-request-id'
        weight: 15
      - id: queue-error-code
        source: body
        match: regex
        pattern: '(?i)<Code>(QueueNotFound|QueueBeingDeleted|QueueAlreadyExists|InvalidQueueName|AuthenticationFailed|ResourceNotFound)</Code>'
        weight: 45
    knowledge_base:
      description: 'Azure Storage Queue provides message queuing on <account>.queue.core.windows.net. Anonymous access is not normally permitted, but leaked account keys or over-scoped SAS tokens can allow message read/peek/write, and account/queue names are enumerable.'
      why_detected: 'Auto-filled from the specific indicators that fired.'
      attack_vectors:
        - name: 'Queue enumeration'
          check: 'GET https://{assetId}.queue.core.windows.net/?comp=list  (lists queues when a valid key/SAS is supplied)'
        - name: 'SAS / account-key reuse'
          check: 'Replay any SAS token or account key found in client code against the queue REST API - read/peek only.'
        - name: 'Message peek without dequeue'
          check: 'GET https://{assetId}.queue.core.windows.net/<queue>/messages?peekonly=true  (non-destructive read)'
        - name: 'Account name brute-force via DNS'
          wordlist: 'azure-storage-accounts.txt'
      verification_steps:
        - 'Request https://{assetId}.queue.core.windows.net/?comp=list and inspect for an AuthenticationFailed error vs. a listing.'
        - 'Confirm the Server header contains Windows-Azure-Queue and record the x-ms-version.'
        - 'If a SAS/key is available, use peekonly=true to read messages without removing them from the queue.'
        - 'Check discovered SAS tokens for over-broad permissions (rwdlacup) and long expiry.'
      repeater_template:
        method: GET
        url: 'https://{assetId}.queue.core.windows.net/?comp=list'
        headers:
          - 'x-ms-version: 2021-08-06'
      wordlists:
        - 'azure-storage-accounts.txt'
        - 'azure-queue-names.txt'
      references:
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/list-queues1'
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/peek-messages'
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/status-and-error-codes2'

