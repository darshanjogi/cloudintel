      high: 95
      very_high: 130
    require_distinct_indicators: 2
    asset:
      extractors:
        - from: host
          regex: '(?i)([a-z0-9]{3,24})\.file\.core\.windows\.net'
          asset_id: '$1'
          label: 'Azure Files storage account: $1'
        - from: url
          regex: '(?i)://[a-z0-9]{3,24}\.file\.core\.windows\.net/([a-z0-9](?:[a-z0-9-]{1,61}[a-z0-9]))'
          asset_id: '$1'
          label: 'Azure Files share: $1'
      host_level_fallback: true
    indicators:
      - id: host-suffix
        source: host
        match: regex
        pattern: '(?i)\.file\.core\.windows\.net'
        weight: 40
      - id: server-header
        source: header
        match: contains
        pattern: 'Windows-Azure-File'
        weight: 35
      - id: x-ms-version-present
        source: header-name
        match: iequals
        pattern: 'x-ms-version'
        weight: 20
      - id: x-ms-request-id-present
        source: header-name
        match: iequals
        pattern: 'x-ms-request-id'
        weight: 15
      - id: files-error-code
        source: body
        match: regex
        pattern: '(?i)<Code>(ShareNotFound|ParentNotFound|ResourceNotFound|ShareAlreadyExists|AuthenticationFailed|SharingViolation)</Code>'
        weight: 45
    knowledge_base:
      description: 'Azure Files exposes SMB/NFS file shares over HTTPS at <account>.file.core.windows.net. The REST/FileREST surface requires a key or SAS, so leaked account keys or over-scoped share SAS tokens are the main risk, enabling directory listing and file download.'
      why_detected: 'Auto-filled from the specific indicators that fired.'
      attack_vectors:
        - name: 'Share enumeration'
          check: 'GET https://{assetId}.file.core.windows.net/?comp=list  (lists shares when authorized)'
        - name: 'Directory / file listing on a share'
          check: 'GET https://{assetId}.file.core.windows.net/<share>?restype=directory&comp=list'
        - name: 'SAS / account-key reuse'
          check: 'Replay a leaked share SAS or account key against the File REST API - read/list only.'
        - name: 'Account name brute-force via DNS'
          wordlist: 'azure-storage-accounts.txt'
      verification_steps:
        - 'Request https://{assetId}.file.core.windows.net/?comp=list and inspect for AuthenticationFailed vs. a shares listing.'
        - 'Confirm the Server header contains Windows-Azure-File and record x-ms-version.'
        - 'With a valid SAS/key, list directories (restype=directory&comp=list) and identify sensitive files before any download.'
        - 'Review discovered SAS tokens for permission scope (rwdlc) and expiry window.'
      repeater_template:
        method: GET
        url: 'https://{assetId}.file.core.windows.net/?comp=list'
        headers:
          - 'x-ms-version: 2021-08-06'
      wordlists:
        - 'azure-storage-accounts.txt'
        - 'azure-file-shares.txt'
      references:
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/list-shares'
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/list-directories-and-files'
        - 'https://learn.microsoft.com/en-us/rest/api/storageservices/status-and-error-codes2'

  # =========================================================================
  - id: azure-key-vault
    name: 'Azure Key Vault'
    category: secrets
    severity: low
    report_threshold: 60
    bands:
      medium: 60
      high: 95
      very_high: 125
    require_distinct_indicators: 2
    asset:
      extractors:
        - from: host
          regex: '(?i)([a-z0-9][a-z0-9-]{1,22}[a-z0-9])\.vault\.azure\.net'
          asset_id: '$1'
          label: 'Azure Key Vault: $1'
        - from: host
          regex: '(?i)([a-z0-9][a-z0-9-]{1,22}[a-z0-9])\.managedhsm\.azure\.net'
          asset_id: '$1'
          label: 'Azure Managed HSM: $1'
      host_level_fallback: true
    indicators:
      - id: host-suffix
        source: host
        match: regex
        pattern: '(?i)\.(vault|managedhsm)\.azure\.net'
        weight: 40
      - id: x-ms-keyvault-region-header
        source: header-name
        match: iequals
        pattern: 'x-ms-keyvault-region'
        weight: 30
      - id: x-ms-keyvault-service-version-header
        source: header-name
        match: iequals
        pattern: 'x-ms-keyvault-service-version'
        weight: 25
      - id: x-ms-keyvault-network-info-header
        source: header-name
        match: iequals
        pattern: 'x-ms-keyvault-network-info'
        weight: 20
      - id: www-authenticate-vault
        source: header
        match: contains
        pattern: 'resource="https://vault.azure.net'
        weight: 35
      - id: keyvault-auth-error
        source: body
        match: regex
        pattern: '(?i)"code"\s*:\s*"Unauthorized".*(credentials|token|authentication)'
        weight: 40
    knowledge_base:
      description: 'Azure Key Vault stores secrets, keys and certificates behind <vault>.vault.azure.net (and Managed HSM at <name>.managedhsm.azure.net). Anonymous data-plane access is denied, so the exposure comes from vaults reachable from the public internet plus leaked service-principal / managed-identity tokens or over-broad access policies.'
      why_detected: 'Auto-filled from the specific indicators that fired.'
      attack_vectors:
        - name: 'Unauthenticated fingerprinting'
          check: 'GET https://{assetId}.vault.azure.net/secrets?api-version=7.4  (expect 401 with a WWW-Authenticate Bearer challenge confirming a live vault)'
        - name: 'Public network access assessment'
          check: 'Determine whether the vault answers from arbitrary IPs (public access vs. private endpoint / firewall).'
        - name: 'Leaked AAD token / SP credential reuse'
          check: 'Test any bearer token or service-principal secret found in code against the data plane - list operations only.'
        - name: 'Vault name brute-force via DNS'
          wordlist: 'azure-keyvault-names.txt'
      verification_steps:
        - 'GET https://{assetId}.vault.azure.net/secrets?api-version=7.4 and confirm a 401 with WWW-Authenticate: Bearer resource="https://vault.azure.net".'
        - 'Inspect response headers for x-ms-keyvault-region and x-ms-keyvault-service-version which are distinctive to Key Vault.'
        - 'Check whether the vault is reachable at all from the test network (public access enabled vs. restricted).'
        - 'Search client code, pipelines and repos for leaked bearer tokens / service-principal secrets granting data-plane access.'
      repeater_template:
        method: GET
        url: 'https://{assetId}.vault.azure.net/secrets?api-version=7.4'
        headers: []
      wordlists:
        - 'azure-keyvault-names.txt'
      references:
        - 'https://learn.microsoft.com/en-us/rest/api/keyvault/'
        - 'https://learn.microsoft.com/en-us/azure/key-vault/general/network-security'
        - 'https://learn.microsoft.com/en-us/azure/key-vault/general/authentication'
